    <script>
        load_product(null);

        function load_product(q) {

            $.ajax({
                url: 'https://kamibox.id/category/fetch',
                type: 'post',
                data: {
                    q: q
                },
                dataType: 'json',
                beforeSend: function() {

                },
                success: function(response) {
                    console.log(response);
                    if (response.error == false) {
                        if (response.is_empty == true) {
							$('#render-data').html(`<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
				<div class="subject-heading text-center">
					<h4 class="box-category no-transform">
    						Kategori tidak ditemukan
					</h4>
				</div>
			</div>`);
                        } else {
                            $('#render-data').html(response.content);
                        }
                    }
                },
                error: function(xhr) {
                    // $('.loader').attr('hidden', true);
                    // $('#render-list').append('something went wrong');

                }
            })
        }

        function _search() {
            let q = $('input[name="search_category"]').val();
            load_product(q);
        }
        $('input[name="search_category"]').on('keypress', function(e) {
            if (e.which == 13) {
                _search();
            }
        });
    </script>

    <script>
    	
        // TOGGLE HAMBURGER & COLLAPSE NAV
        $('.nav-toggle').on('click', function() {
            $(this).toggleClass('open');
            $('.menu-right').toggleClass('collapse');
        });
        // REMOVE X & COLLAPSE NAV ON ON CLICK
        $('.menu-right a').on('click', function() {
            $('.nav-toggle').removeClass('open');
            $('.menu-right').removeClass('collapse');
        });

        // LINKS TO ANCHORS
        $('.menu-right a[href^="#"]').on('click', function(event) {

            var $target = $(this.getAttribute('href'));

            if ($target.length) {
                event.preventDefault();
                $('html, body').stop().animate({
                    scrollTop: $target.offset().top
                }, 750, 'easeInOutQuad');
            }
        });
        function _warningCompletedData(){
            swal('Warning','Lengkapi Profile dan Alamat','warning');
        }
        function show_pwd(e) {
            var input_target = $(e).attr('data-target-name');
            var pwd = $('input[name="' + input_target + '"]');
            if (pwd.attr('type') == 'password') {
                pwd.attr('type', 'text');
                $(e).attr('class', 'show-pwd fa fa-eye pointer');
            } else {
                pwd.attr('type', 'password');
                $(e).attr('class', 'show-pwd fa fa-eye-slash pointer');
            }
        };
    </script>
